<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Lenis Smooth Scroll</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      overflow-x: hidden;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
    }

    /* Required for Lenis */
    html.lenis,
    html.lenis body {
      height: auto;
    }

    .lenis.lenis-smooth {
      scroll-behavior: auto !important;
    }

    .lenis.lenis-stopped {
      overflow: hidden;
    }

    .lenis.lenis-scrolling iframe {
      pointer-events: none;
    }

    /* Demo Sections */
    .section {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 80px;
      font-weight: bold;
      text-transform: uppercase;
    }

    .section:nth-child(1) {
      background: #111;
    }

    .section:nth-child(2) {
      background: #222;
    }

    .section:nth-child(3) {
      background: #333;
    }

    .section:nth-child(4) {
      background: #444;
    }

    .section:nth-child(5) {
      background: #555;
    }
  </style>
</head>

<body>

  <div class="section">Section 1</div>
  <div class="section">Section 2</div>
  <div class="section">Section 3</div>
  <div class="section">Section 4</div>
  <div class="section">Section 5</div>

  <!-- Lenis CDN -->
  <script src="https://unpkg.com/lenis@1.1.16/dist/lenis.min.js"></script>

  <script>
    // Initialize Lenis
    const lenis = new Lenis({
      lerp: 0.05,
      duration: 1.5,
      smoothWheel: true,
      syncTouch: true,
      wheelMultiplier: 1,
      touchMultiplier: 2,
	  infinite: true,
    });

    // Animation Frame
    function raf(time) {
      lenis.raf(time);
      requestAnimationFrame(raf);
    }

    requestAnimationFrame(raf);
  </script>

</body>
</html>
